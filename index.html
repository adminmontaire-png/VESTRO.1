<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VESTRO | Clothing Store</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<header>
    <div class="logo">VESTRO</div>

    <nav>
        <a href="#">Home</a>
        <a href="#">Shop</a>
        <a href="#">About</a>
        <a href="#">Contact</a>
    </nav>

    <div class="icons">
        <i class="fas fa-search"></i>
        <i class="fas fa-shopping-cart"></i>
    </div>
</header>

<section class="hero">
    <h1>Wear Confidence, Define Style</h1>
    <p>Premium Clothing Collection</p>
    <button>Shop Now</button>
</section>

<section class="products">
    <h2>Featured Products</h2>

    <div class="product-grid">

        <div class="card">
            <img src="https://via.placeholder.com/300x350" alt="">
            <h3>Premium Hoodie</h3>
            <p>$39.99</p>
        </div>

        <div class="card">
            <img src="https://via.placeholder.com/300x350" alt="">
            <h3>Classic T-Shirt</h3>
            <p>$24.99</p>
        </div>

        <div class="card">
            <img src="https://via.placeholder.com/300x350" alt="">
            <h3>Denim Jacket</h3>
            <p>$59.99</p>
        </div>

    </div>
</section>

<section class="contact">
    <h2>Connect With Us</h2>

    <p>Email: adminmondair@gmail.com</p>

    <div class="social">
        <a href="#"><i class="fab fa-facebook"></i></a>
        <a href="#"><i class="fab fa-instagram"></i></a>
    </div>
</section>

<footer>
    <p>© 2026 VESTRO. All Rights Reserved.</p>
</footer>

</body>
</html>
